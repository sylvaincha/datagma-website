backend:
  name: github
  repo: sylvaincha/enrich-crm
  branch: main
  base_url: https://enrich-crm.com
  auth_endpoint: api/oauth/auth

site_url: https://enrich-crm.com
display_url: https://enrich-crm.com

editor:
  preview: true

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog_en"
    label: "Blog (EN)"
    folder: "src/content/blog/en"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["title", "description", "commit_date"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false, field: { label: "Tag", name: "tag", widget: "string" } }
      - { label: "Description", name: "description", widget: "text", required: false }
      - label: "Images (order matters: hero first)"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Source URL", name: "sourceUrl", widget: "string", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - label: "Body"
        name: "body"
        widget: "markdown"
        modes: ["rich_text", "raw"]
        buttons:
          [
            "bold",
            "italic",
            "link",
            "heading-two",
            "heading-three",
            "quote",
            "bulleted-list",
            "numbered-list",
            "code",
          ]
        editor_components: ["image", "code-block", "callout", "cta", "figure", "youtube"]

