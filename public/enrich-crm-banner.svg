<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191" role="img" aria-labelledby="title desc">
  <title id="title">Enrich-CRM - Editorial banner</title>
  <desc id="desc">Editorial LinkedIn company banner with before and after CRM data enrichment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#cbd5e1" stroke-width="0.5" opacity="0.14"/>
    </pattern>
  </defs>

  <rect width="1128" height="191" fill="url(#bg)"/>
  <rect width="1128" height="191" fill="url(#grid)"/>
  <circle cx="170" cy="8" r="170" fill="#dbeafe" opacity="0.38"/>
  <circle cx="985" cy="176" r="160" fill="#ede9fe" opacity="0.52"/>
  <rect width="1128" height="3" fill="url(#accent)"/>

  <!-- LinkedIn logo safe zone -->
  <rect x="0" y="72" width="248" height="119" fill="#ffffff" opacity="0.72"/>

  <!-- Editorial copy -->
  <g transform="translate(262,0)">
    <rect x="0" y="28" width="138" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="14" cy="39" r="3" fill="#2563eb"/>
    <text x="24" y="42.8" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#475569">REAL-TIME ENRICHMENT</text>

    <text x="0" y="76" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#0e132a" letter-spacing="-0.04em">Wrong data slows every deal.</text>
    <text x="0" y="116" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="url(#accent)" letter-spacing="-0.04em">Live enrichment fixes it.</text>

    <rect x="0" y="154" width="306" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="168.8" font-family="Inter, system-ui, sans-serif" font-size="8.8" font-weight="500" fill="#64748b">
      <tspan fill="#ca8a04" font-weight="700">4.8/5</tspan> HubSpot
      <tspan fill="#d4d4d8"> &#183; </tspan>
      <tspan fill="#1a936f" font-weight="700">93.7%</tspan> match
      <tspan fill="#d4d4d8"> &#183; </tspan>
      <tspan fill="#0e132a" font-weight="700">EU native</tspan>
    </text>
  </g>

  <!-- Before card -->
  <g transform="translate(694,56)" opacity="0.82">
    <rect width="128" height="82" rx="14" fill="#ffffff" stroke="#fecaca" stroke-width="1.25"/>
    <rect width="128" height="24" rx="14" fill="#fef2f2"/>
    <rect x="12" y="7" width="44" height="12" rx="6" fill="#ef4444"/>
    <text x="34" y="15.7" text-anchor="middle" font-family="Inter, sans-serif" font-size="6.6" font-weight="800" fill="#ffffff" letter-spacing="0.05em">BEFORE</text>
    <circle cx="24" cy="44" r="8" fill="#f1f5f9"/>
    <path d="M24 41c-1.6 0-2.9 1.1-2.9 2.8v1h5.8v-1c0-1.7-1.3-2.8-2.9-2.8z" fill="#cbd5e1"/>
    <text x="38" y="43" font-family="Inter, sans-serif" font-size="8.2" font-weight="700" fill="#94a3b8">Sarah Chen</text>
    <text x="38" y="54.5" font-family="Inter, sans-serif" font-size="7" font-weight="500" fill="#94a3b8">Title: -</text>
    <rect x="12" y="60" width="104" height="14" rx="5" fill="#f8fafc" stroke="#f1f5f9"/>
    <text x="18" y="70" font-family="ui-monospace, monospace" font-size="6.4" font-weight="600" fill="#64748b">sarah@hotmail.com</text>
    <polygon points="110,63 114,71 106,71" fill="#f59e0b"/>
    <text x="110" y="69.2" text-anchor="middle" font-family="Inter, sans-serif" font-size="5" font-weight="800" fill="#ffffff">!</text>
  </g>

  <!-- After hero card -->
  <circle cx="978" cy="94" r="78" fill="#dcfce7" opacity="0.62"/>
  <circle cx="1008" cy="68" r="54" fill="#dbeafe" opacity="0.40"/>
  <g transform="translate(856,20)">
    <rect width="226" height="142" rx="16" fill="#ffffff" stroke="#4ade80" stroke-width="2.25"/>
    <rect width="220" height="34" rx="16" fill="#ecfdf5"/>
    <rect x="14" y="9" width="46" height="13" rx="6.5" fill="#10b981"/>
    <text x="37" y="17.5" text-anchor="middle" font-family="Inter, sans-serif" font-size="6.8" font-weight="800" fill="#ffffff" letter-spacing="0.05em">AFTER</text>
    <text x="210" y="18" text-anchor="end" font-family="Inter, sans-serif" font-size="7.4" font-weight="800" fill="#047857">SCORE: 91</text>

    <circle cx="34" cy="58" r="14" fill="#0f172a"/>
    <text x="34" y="62" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#ffffff">SC</text>
    <text x="56" y="54" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#0f172a">Sarah Chen</text>
    <text x="56" y="67" font-family="Inter, sans-serif" font-size="8.5" font-weight="700" fill="#10b981">VP of Sales @ Alma</text>

    <rect x="14" y="80" width="196" height="20" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="22" y="93.5" font-family="ui-monospace, monospace" font-size="8.3" font-weight="700" fill="#065f46">sarah@alma.com</text>
    <circle cx="196" cy="90" r="7" fill="#10b981"/>
    <path d="M193 90l2 2 4-4" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>

    <rect x="14" y="104" width="196" height="20" rx="6" fill="#f8fafc" stroke="#dbeafe"/>
    <text x="22" y="117.5" font-family="ui-monospace, monospace" font-size="7.9" font-weight="600" fill="#475569">+1 415 234 5678 &#183; 200 employees</text>

    <rect x="14" y="128" width="80" height="14" rx="7" fill="#fde68a"/>
    <text x="23" y="137.6" font-family="Inter, sans-serif" font-size="7" font-weight="800" fill="#854d0e">Hiring Sales</text>
    <rect x="100" y="128" width="52" height="14" rx="7" fill="#ddd6fe"/>
    <text x="109" y="137.6" font-family="Inter, sans-serif" font-size="7" font-weight="800" fill="#3730a3">Series B</text>
    <rect x="158" y="128" width="42" height="14" rx="7" fill="#bbf7d0"/>
    <text x="167" y="137.6" font-family="Inter, sans-serif" font-size="7" font-weight="800" fill="#166534">EU</text>
  </g>
</svg>
