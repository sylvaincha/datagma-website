<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191" role="img" aria-labelledby="title desc">
  <title id="title">Enrich-CRM - Product UI banner</title>
  <desc id="desc">Product UI banner inspired by CRM interfaces, with before and after enrichment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#cbd5e1" stroke-width="0.5" opacity="0.14"/>
    </pattern>
  </defs>

  <rect width="1128" height="191" fill="url(#bg)"/>
  <rect width="1128" height="191" fill="url(#grid)"/>
  <circle cx="180" cy="18" r="150" fill="#dbeafe" opacity="0.4"/>
  <circle cx="1010" cy="176" r="155" fill="#ede9fe" opacity="0.55"/>
  <rect width="1128" height="3" fill="url(#accent)"/>

  <!-- LinkedIn safe zone -->
  <rect x="0" y="70" width="248" height="121" fill="#ffffff" opacity="0.7"/>

  <!-- Left product copy -->
  <g transform="translate(262,0)">
    <rect x="0" y="28" width="92" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="14" cy="39" r="3" fill="#2563eb"/>
    <text x="24" y="42.8" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#475569">HUBSPOT NATIVE</text>

    <text x="0" y="76" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#0e132a" letter-spacing="-0.03em">Before: stale data.</text>
    <text x="0" y="110" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="url(#accent)" letter-spacing="-0.03em">After: ready to work.</text>
    <text x="0" y="142" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#64748b">Enrich contacts, firmographics and buying signals in one flow.</text>

    <rect x="0" y="154" width="312" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="168.2" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" fill="#64748b">
      <tspan fill="#ca8a04" font-weight="700">4.8/5</tspan> HubSpot
      <tspan fill="#d4d4d8"> &#160;&#183;&#160; </tspan>
      <tspan fill="#1a936f" font-weight="700">93.7%</tspan> match
      <tspan fill="#d4d4d8"> &#160;&#183;&#160; </tspan>
      <tspan fill="#0e132a" font-weight="700">CSV + API + Clay</tspan>
    </text>
  </g>

  <!-- UI shell -->
  <g transform="translate(642,22)">
    <rect width="446" height="146" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
    <rect width="446" height="28" rx="18" fill="#f8fafc"/>
    <circle cx="16" cy="14" r="3" fill="#f87171"/>
    <circle cx="28" cy="14" r="3" fill="#fbbf24"/>
    <circle cx="40" cy="14" r="3" fill="#34d399"/>

    <!-- before column -->
    <rect x="16" y="42" width="148" height="88" rx="14" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
    <rect x="16" y="42" width="148" height="24" rx="14" fill="#fef2f2"/>
    <rect x="28" y="48" width="42" height="11" rx="5.5" fill="#ef4444"/>
    <text x="49" y="56.2" text-anchor="middle" font-family="Inter, sans-serif" font-size="6.5" font-weight="800" fill="#ffffff">BEFORE</text>
    <circle cx="38" cy="86" r="9" fill="#f1f5f9"/>
    <path d="M38 82.5c-1.8 0-3.2 1.2-3.2 3.1v1.1h6.4v-1.1c0-1.9-1.4-3.1-3.2-3.1z" fill="#cbd5e1"/>
    <text x="54" y="84" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#94a3b8">Sarah Chen</text>
    <text x="54" y="95.5" font-family="Inter, sans-serif" font-size="7.5" fill="#94a3b8">VP Sales: missing</text>
    <rect x="28" y="104" width="120" height="16" rx="5" fill="#f8fafc" stroke="#f1f5f9"/>
    <text x="34" y="115.2" font-family="ui-monospace, monospace" font-size="6.8" font-weight="600" fill="#64748b">sarah@hotmail.com</text>
    <polygon points="142,108 146,116 138,116" fill="#f59e0b"/>

    <!-- center action -->
    <g transform="translate(184,78)">
      <rect x="-10" y="-18" width="78" height="16" rx="8" fill="#0f172a"/>
      <circle cx="0" cy="-10" r="2" fill="#10b981"/>
      <text x="28" y="-6.5" text-anchor="middle" font-family="Inter, sans-serif" font-size="6.5" font-weight="800" fill="#fde68a">LIVE LOOKUP</text>
      <line x1="0" y1="10" x2="34" y2="10" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="44,10 34,4 34,16" fill="#10b981"/>
    </g>

    <!-- after column -->
    <rect x="248" y="36" width="182" height="100" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
    <rect x="248" y="36" width="182" height="28" rx="16" fill="#ecfdf5"/>
    <rect x="260" y="43" width="42" height="11" rx="5.5" fill="#10b981"/>
    <text x="281" y="51.2" text-anchor="middle" font-family="Inter, sans-serif" font-size="6.5" font-weight="800" fill="#ffffff">AFTER</text>
    <text x="414" y="52" text-anchor="end" font-family="Inter, sans-serif" font-size="6.8" font-weight="800" fill="#047857">SCORE: 91</text>

    <circle cx="270" cy="82" r="12" fill="#0f172a"/>
    <text x="270" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#ffffff">SC</text>
    <text x="290" y="78" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#0f172a">Sarah Chen</text>
    <text x="290" y="90" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#10b981">VP of Sales @ Alma</text>

    <rect x="260" y="98" width="150" height="16" rx="5" fill="#f0fdf4" stroke="#dcfce7"/>
    <text x="266" y="109.2" font-family="ui-monospace, monospace" font-size="7.2" font-weight="700" fill="#065f46">sarah@alma.com</text>
    <circle cx="396" cy="106" r="6" fill="#10b981"/>
    <path d="M393 106l2 2 4-4" fill="none" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round"/>

    <rect x="260" y="118" width="150" height="14" rx="5" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="266" y="127.8" font-family="ui-monospace, monospace" font-size="6.8" font-weight="600" fill="#475569">+1 415 234 5678 &#183; 200 employees</text>

    <!-- bottom chips -->
    <rect x="260" y="136" width="70" height="12" rx="6" fill="#fde68a"/>
    <text x="268" y="144.6" font-family="Inter, sans-serif" font-size="6.2" font-weight="800" fill="#854d0e">Hiring Sales</text>
    <rect x="334" y="136" width="46" height="12" rx="6" fill="#ddd6fe"/>
    <text x="342" y="144.6" font-family="Inter, sans-serif" font-size="6.2" font-weight="800" fill="#3730a3">Series B</text>
    <rect x="384" y="136" width="30" height="12" rx="6" fill="#bbf7d0"/>
    <text x="391" y="144.6" font-family="Inter, sans-serif" font-size="6.2" font-weight="800" fill="#166534">EU</text>
  </g>
</svg>
